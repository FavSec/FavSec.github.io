<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aiden Security Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
            color: #222;
        }
        header {
            padding: 3rem 2rem;
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            font-size: 1.15rem;
            font-weight: 300;
            color: #555;
            margin-top: 0;
        }
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .card {
            background: white;
            padding: 1.75rem;
            margin: 1rem 0;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.4rem;
            font-weight: 600;
        }
        .card p {
            font-size: 0.95rem;
            color: #444;
            line-height: 1.6;
        }
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>
    <header>
        <h1>Aiden's Web Security Projects</h1>
        <p class="subtitle">Minimalistic. Clean. Secure.</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>🔍 Vulnerability Research</h2>
            <p>A collection of hands-on analyses, exploit breakdowns, and security test environments exploring real-world web vulnerabilities.</p>
        </div>

        <div class="card">
            <h2>🛡 Secure Development</h2>
            <p>Examples of secure coding practices, hardened back-end templates, and defensive middleware libraries.</p>
        </div>

        <div class="card">
            <h2>⚙ Offensive Tools</h2>
            <p>Custom-built utilities for exploring attack surfaces, including payload testers, JWT manipulators, and sandbox environments.</p>
        </div>

        <div class="card">
            <h2>📝 Write-Ups & Documentation</h2>
            <p>Clean write-ups for CTF challenges, walkthroughs, and practical explanations of attack methodologies.</p>
        </div>
    </div>

    <footer>
        © 2025 Aiden — Built with security in mind.
    </footer>
</body>
</html>
